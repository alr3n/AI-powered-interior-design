name: spacesense_ai
description: AI-powered interior scanning, analysis, and redesign.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  cloud_functions: ^5.1.5
  google_sign_in: ^6.2.2

  # Capture & AR
  camera: ^0.11.0
  flutter_image_compress: ^2.3.0
  # AR measure (S4): add when integrating on-device —
  # ar_flutter_plugin_2: ^0.0.3

  # UI
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Reports & storage
  pdf: ^3.11.1
  printing: ^5.13.4
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
